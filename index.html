<!DOCTYPE html>
<html lang="id" class="w-full h-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BikinWeb - Website Modern Untuk Semua Kebutuhan</title>
    
    <!-- Favicon BikinWeb -->
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1FlXtVffUl6UWFP_CTP6xY19n_7ND5vkR" type="image/png">
    <link rel="shortcut icon" href="https://lh3.googleusercontent.com/d/1FlXtVffUl6UWFP_CTP6xY19n_7ND5vkR" type="image/png">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1FlXtVffUl6UWFP_CTP6xY19n_7ND5vkR">
    
    <!-- Meta Tag SEO & Social Sharing -->
    <meta name="description" content="Ceritakan kebutuhanmu, kami bantu membuat website, landing page, atau dashboard yang modern, profesional, dan siap digunakan. Mulai dari Rp200.000.">
    <meta property="og:title" content="BikinWeb - Website Modern Untuk Semua Kebutuhan">
    <meta property="og:description" content="Mulai dari Rp200.000 tanpa proses yang rumit. Hubungi kami sekarang untuk konsultasi gratis.">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'] 
                    }
                }
            }
        }
    </script>

    <style>
        /* Mencegah scroll mental di browser seluler */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F5F5F7;
            -webkit-overflow-scrolling: touch;
        }
        
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Loading Spinner Pulse */
        @keyframes customPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }
        .animate-loader-pulse {
            animation: customPulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans antialiased w-full h-full relative">

    <!-- Preloader Screen (Apple-esque Minimalism) -->
    <div id="preloader" class="fixed inset-0 z-50 bg-[#F5F5F7] flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
        <div class="flex flex-col items-center justify-center space-y-6 animate-loader-pulse">
            <!-- Elegant Brand Logo Indicator -->
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-[#1D1D1F]"></span>
                <span class="text-xl font-bold tracking-tight text-[#1D1D1F]">BikinWeb</span>
            </div>
            <!-- Minimal progress loop bar -->
            <div class="w-16 h-[2px] bg-neutral-200 rounded-full overflow-hidden relative">
                <div class="absolute left-0 top-0 h-full w-1/2 bg-[#1D1D1F] rounded-full animate-[loadingBar_1.5s_infinite_ease-in-out]"></div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Google Apps Script Frame Container -->
    <div class="w-full h-full">
        <iframe 
            id="appIframe" 
            src="https://script.google.com/macros/s/AKfycbw8h0x38vJQuZJL1nY89jUA1YYav-FMO4J6zKxx1PpxNwjHPJjGcGjMgCrLSaEeOx4/exec" 
            allow="geolocation; microphone; camera; midi; encrypted-media;" 
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
            onload="hidePreloader()">
        </iframe>
    </div>

    <script>
        // Fungsi untuk menghilangkan loading screen begitu iframe termuat sempurna
        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                // Memberikan efek fade out transisi mulus
                preloader.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 700); // Sinkron dengan durasi transisi Tailwind (duration-700)
            }
        }

        // Fail-safe: Jika karena hambatan server Google yang membuat onload iframe terlambat, 
        // hilangkan loader otomatis setelah batas waktu aman (8 detik) agar user tidak stuck.
        setTimeout(() => {
            const preloader = document.getElementById('preloader');
            if (preloader && preloader.style.display !== 'none') {
                hidePreloader();
            }
        }, 8000);
    </script>
</body>
</html>
